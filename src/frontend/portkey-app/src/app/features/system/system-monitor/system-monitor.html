<div class="system-monitor">
  <div class="page-header">
    <h2>System Monitor</h2>
    <div class="status-badge" [class.connected]="connected()">
      <span class="dot"></span>
      {{ connected() ? 'Live' : 'Connecting...' }}
    </div>
  </div>

  @if (latest()) {
    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">CPU</div>
        <div class="kpi-value cpu">{{ latest()!.cpuPercent }}%</div>
        <div class="kpi-sub">API Process</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Working Set</div>
        <div class="kpi-value mem">{{ latest()!.workingSetMb }} MB</div>
        <div class="kpi-sub">Physical memory</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Managed Heap</div>
        <div class="kpi-value gc">{{ latest()!.managedMemoryMb }} MB</div>
        <div class="kpi-sub">GC memory</div>
      </div>
    </div>
  }

  <div class="charts-grid">
    <div class="chart-card">
      <div class="card-title">CPU Usage (%)</div>
      <div class="chart-wrapper">
        <app-echart [option]="cpuOption()" />
      </div>
    </div>
    <div class="chart-card">
      <div class="card-title">Memory — Working Set (MB)</div>
      <div class="chart-wrapper">
        <app-echart [option]="memOption()" />
      </div>
    </div>
  </div>
</div>
