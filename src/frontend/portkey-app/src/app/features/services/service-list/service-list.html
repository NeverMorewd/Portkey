<p-toast position="bottom-right" />
<div class="service-list-container">
    <p-table [value]="services()" [loading]="loading()" [paginator]="false" [rows]="15"
        styleClass="p-datatable-striped">
        <ng-template #caption>
            <div class="table-header" style="display:flex; justify-content:space-between; align-items:center;">
                <span>Services</span>
                <div style="display:flex; gap:8px;">
                    <p-button label="Refresh" icon="pi pi-refresh" (click)="ngOnInit()" />
                    <p-button label="Add Service" icon="pi pi-plus" (click)="showAddDialog.set(true)" />
                </div>
            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Port</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </ng-template>

        <ng-template #body let-item>
            <tr (click)="selectedServiceId.set(item.id)" style="cursor:pointer;">
                <td>{{ item.name }}</td>
                <td>{{ item.address }}</td>
                <td>{{ item.port }}</td>
                <td>
                    <p-tag [value]="item.status" severity="info" />
                </td>

                <td style="display:flex; gap:8px;">
                    @if (item.status === 'Running') {
                    <p-button label="Stop" icon="pi pi-stop" severity="danger" (click)="stopService(item.id)" />
                    } @else {
                    <p-button label="Start" icon="pi pi-play" severity="success" (click)="startService(item.id)" />
                    }
                    <p-button label="Delete" icon="pi pi-trash" severity="danger" (click)="deleteService(item.id)" />
                </td>
            </tr>
        </ng-template>

        <ng-template #empty>
            <tr>
                <td colspan="5" style="text-align:center">No service found.</td>
            </tr>
        </ng-template>
    </p-table>
    <p-dialog header="Add Service" [visible]="showAddDialog()" (onHide)="showAddDialog.set(false)" [modal]="true"
        [style]="{width: '400px'}">
        <div style="display:flex; flex-direction:column; gap:16px; padding:8px 0;">
            <input pInputText placeholder="Name" [ngModel]="newService().name"
                (ngModelChange)="newService.set({...newService(), name: $event})" />
            <input pInputText placeholder="Address" [ngModel]="newService().address"
                (ngModelChange)="newService.set({...newService(), address: $event})" />
            <input pInputText type="number" placeholder="Port" [ngModel]="newService().port"
                (ngModelChange)="newService.set({...newService(), port: +$event})" />
            <input pInputText placeholder="Start Command" [ngModel]="newService().startCommand"
                (ngModelChange)="newService.set({...newService(), startCommand: $event})" />
        </div>
        <ng-template #footer>
            <p-button label="Cancel" severity="secondary" (click)="showAddDialog.set(false)" />
            <p-button label="Save" (click)="addService(newService())" />
        </ng-template>
    </p-dialog>
</div>
  @if (selectedServiceId() !== null) {
    <div style="margin-top:16px;">
      <app-log-viewer [serviceId]="selectedServiceId()!" (statusChanged)="onServiceStatusChanged($event)"  />
    </div>
  }
